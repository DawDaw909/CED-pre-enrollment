<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Dashboard — CED Pre-Enrollment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
  :root {
    --maroon: #6e1020;
    --maroon-dark: #4a0a15;
    --gold: #e8c97a;
    --glass-white: rgba(255, 255, 255, 0.85);
    --glass-border: rgba(255, 255, 255, 0.4);
    --text-main: #2d3436;
    --text-muted: #636e72;
    --success: #1a7a4a;
    --success-bg: #edfaf3;
    --warning: #b45309;
    --warning-bg: #fef9ee;
    --error: #c0392b;
    --error-bg: #fdf0ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: url('/assets/SU-Hall.jpg') no-repeat center center fixed;
    background-size: cover;
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: -1;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    top: 20px; left: 20px; bottom: 20px;
    width: 260px;
    background: rgba(74, 10, 21, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .sidebar-brand {
    padding: 2.5rem 1.5rem;
    text-align: center;
  }

  .sidebar-brand img {
    height: 60px; width: 60px;
    margin: 0 auto 1rem;
    display: block;
    background: white;
    border-radius: 50%;
    padding: 2px;
  }

  .sidebar-brand h2 {
    font-family: 'DM Serif Display', serif;
    color: #fff;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .nav-group { flex: 1; padding: 1rem; }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-radius: 12px;
    margin-bottom: 8px;
    transition: all 0.3s ease;
    font-size: 14px;
  }

  .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-item.active { background: var(--gold); color: var(--maroon-dark); font-weight: 600; }

  .notice-badge {
    background: var(--gold);
    color: var(--maroon-dark);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: bold;
  }

  .logout-area { padding: 1.5rem; }
  .btn-logout {
    width: 100%; padding: 12px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  /* MAIN CONTENT AREA */
  .main { margin-left: 300px; padding: 20px; }

  .header-glass {
    background: var(--glass-white);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .header-glass h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--maroon); }

  /* CONTENT GLASS */
  .content-glass {
    background: var(--glass-white);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 20px;
    animation: fadeInUp 0.5s ease forwards;
  }

  /* PROFILE STYLES */
  .profile-section {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--maroon);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .profile-info h2 { font-family: 'DM Serif Display', serif; color: var(--maroon-dark); font-size: 1.6rem; }
  .profile-info p { font-size: 14px; color: var(--text-muted); margin: 2px 0; }

  .badges-container {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  /* TABLE STYLES */
  table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
  th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.05); }
  td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); }

  /* UI COMPONENTS */
  .badge { 
    display: inline-block;
    padding: 4px 12px; 
    border-radius: 20px; 
    font-size: 11px; 
    font-weight: 600; 
  }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-notok { background: var(--error-bg); color: var(--error); }
  .badge-gray { background: #f1f3f4; color: var(--text-muted); }
  .badge-new { background: #e8f0fe; color: #1a56db; }
  .badge-old { background: #fef3c7; color: #92400e; }
  .badge-enrolled { background: var(--success-bg); color: var(--success); }
  .badge-pending { background: var(--warning-bg); color: var(--warning); }

  .subject-code { font-weight: 600; color: var(--maroon); }

  .notice-card {
    background: rgba(255,255,255,0.5);
    border-left: 4px solid var(--gold);
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
  }
  .notice-type {
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--maroon);
    margin-bottom: 5px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .empty-state { text-align: center; color: var(--text-muted); padding: 40px 0; font-style: italic; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img src="/assets/CED-Logo-NoBG.png" alt="CED Logo"/>
    <h2>STUDENT PORTAL</h2>
    <p style="color: var(--gold); font-size: 10px; margin-top: 5px;">COLLEGE OF ENGINEERING</p>
  </div>
  
  <nav class="nav-group">
    <div class="nav-item active" onclick="showPanel('overview', this)">
      <span>My Enrollment</span>
    </div>
    <div class="nav-item" onclick="showPanel('notices', this)">
      <span>Notices</span>
      <span id="noticeCount" class="notice-badge" style="display: none;">0</span>
    </div>
  </nav>

  <div class="logout-area">
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <div class="header-glass">
    <h1 id="viewTitle">My Enrollment</h1>
    <div style="text-align: right">
      <p style="font-weight: 600;" id="topbarUser">--</p>
      <p style="font-size: 12px; color: var(--text-muted);">S.Y. 2025-2026</p>
    </div>
  </div>

  <div class="panel active" id="panel-overview">
    <div class="content-glass">
      <div class="profile-section">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <h2 id="profileName">Student Name</h2>
          <p id="profileCourse">Course & Year</p>
          <p id="profileNumber">ID: 0000-0000</p>
          <div class="badges-container" id="profileBadges"></div>
        </div>
      </div>
    </div>

    <div class="content-glass">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h3>Enrolled Subjects</h3>
        <span style="font-weight: 600; color: var(--maroon);" id="totalUnits">Total: 0 units</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Subject</th>
            <th>Units</th>
            <th>Type</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="subjectTableBody">
          <tr><td colspan="5" class="empty-state">No subjects enrolled yet.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Notices Inline on Overview -->
    <div class="content-glass" id="noticesInlineSection" style="display: none;">
      <h3>Recent Notices</h3>
      <div id="noticesInline"></div>
    </div>
  </div>

  <div class="panel" id="panel-notices">
    <div class="content-glass">
      <h3>All Notifications</h3>
      <div id="noticesList">
        <div class="empty-state">No pending notices.</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

function getToken() { return localStorage.getItem('token'); }

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${getToken()}`
  };
}

function logout() {
  localStorage.clear();
  window.location.href = '../login.html';
}

function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('viewTitle').innerText = el.querySelector('span:first-child')?.innerText || el.innerText;
}

// ── LOAD STUDENT DATA ──────────────────────────────────────
async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/students/me`, { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) { logout(); return; }

    const data = await res.json();
    const { student, subjects, notices } = data;

    // Profile
    const initials = student.first_name[0] + student.last_name[0];
    document.getElementById('profileAvatar').textContent = initials.toUpperCase();
    document.getElementById('profileName').textContent = `${student.first_name} ${student.last_name}`;
    document.getElementById('profileCourse').textContent = `${student.course} — Year ${student.year_level}`;
    document.getElementById('profileNumber').textContent = student.student_number;
    document.getElementById('topbarUser').textContent = student.first_name + ' ' + student.last_name;

    // Badges
    const badgesEl = document.getElementById('profileBadges');
    badgesEl.innerHTML = `
      <span class="badge badge-${student.type}">${student.type}</span>
      <span class="badge ${student.ok_to_enroll ? 'badge-ok' : 'badge-notok'}">${student.ok_to_enroll ? 'Cleared for Enrollment' : 'Payment Pending'}</span>
      ${student.status ? `<span class="badge badge-${student.status}">${student.status}</span>` : ''}
    `;

    // Subjects
    const tbody = document.getElementById('subjectTableBody');
    if (!subjects || subjects.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No subjects enrolled yet.</td></tr>`;
      document.getElementById('totalUnits').textContent = 'Total: 0 units';
    } else {
      tbody.innerHTML = subjects.map(s => `
        <tr>
          <td class="subject-code">${escapeHtml(s.code)}</td>
          <td>${escapeHtml(s.name)}</td>
          <td>${s.units}</td>
          <td><span class="badge badge-gray">${escapeHtml(s.type || 'Regular')}</span></td>
          <td><span class="badge badge-${s.status === 'auto_enrolled' ? 'new' : 'old'}">${escapeHtml(s.status ? s.status.replace(/_/g, ' ') : 'Enrolled')}</span></td>
        </tr>
      `).join('');

      const total = subjects.reduce((sum, s) => sum + (s.units || 0), 0);
      document.getElementById('totalUnits').textContent = `Total: ${total} units`;
    }

    // Notices inline on overview
    const noticesInlineSection = document.getElementById('noticesInlineSection');
    const noticesInline = document.getElementById('noticesInline');
    
    if (notices && notices.length > 0) {
      noticesInlineSection.style.display = 'block';
      noticesInline.innerHTML = notices.slice(0, 3).map(n => `
        <div class="notice-card">
          <div class="notice-type">${escapeHtml(n.type ? n.type.replace(/_/g, ' ') : 'Notice')}</div>
          <div>${escapeHtml(n.message)}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:6px;">${new Date(n.created_at).toLocaleDateString()}</div>
        </div>
      `).join('');
      
      // Update sidebar notice count
      const countEl = document.getElementById('noticeCount');
      countEl.textContent = notices.length;
      countEl.style.display = 'inline-block';
    } else {
      noticesInlineSection.style.display = 'none';
      const countEl = document.getElementById('noticeCount');
      countEl.style.display = 'none';
    }

    // Notices panel
    const noticesList = document.getElementById('noticesList');
    if (!notices || notices.length === 0) {
      noticesList.innerHTML = `<div class="empty-state">No pending notices.</div>`;
    } else {
      noticesList.innerHTML = notices.map(n => `
        <div class="notice-card">
          <div class="notice-type">${escapeHtml(n.type ? n.type.replace(/_/g, ' ') : 'Notice')}</div>
          <div>${escapeHtml(n.message)}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:6px;">${new Date(n.created_at).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

  } catch (err) {
    console.error('Error loading dashboard:', err);
    document.getElementById('subjectTableBody').innerHTML = 
      `<tr><td colspan="5" class="empty-state">Unable to load enrollment data. Please try again later.</td></tr>`;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ── INIT ───────────────────────────────────────────────────
//I UNCOMMENT RANI
/*if (!getToken() || localStorage.getItem('role') !== 'student') {
  window.location.href = '../login.html';
}*/

loadDashboard();
</script>
</body>
</html>
